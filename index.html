<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monitoramento de Análises — Londrisoft</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface-2: #f9f9f8;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --text-2: #5a5a56;
    --text-3: #9a9a94;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --accent-text: #1d4ed8;
    --success-bg: #f0fdf4;
    --success-text: #166534;
    --warning-bg: #fffbeb;
    --warning-text: #92400e;
    --danger-bg: #fef2f2;
    --danger-text: #991b1b;
    --purple-bg: #f5f3ff;
    --purple-text: #5b21b6;
    --gray-bg: #f1f0ec;
    --gray-text: #444441;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --surface-2: #242422;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --text: #e8e8e4;
      --text-2: #a0a09a;
      --text-3: #606059;
      --accent: #60a5fa;
      --accent-bg: #1e3a5f;
      --accent-text: #93c5fd;
      --success-bg: #052e16;
      --success-text: #86efac;
      --warning-bg: #451a03;
      --warning-text: #fcd34d;
      --danger-bg: #450a0a;
      --danger-text: #fca5a5;
      --purple-bg: #2e1065;
      --purple-text: #c4b5fd;
      --gray-bg: #2c2c2a;
      --gray-text: #a0a09a;
    }
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border-strong);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo { width: 28px; height: 28px; background: #2563eb; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 16px; height: 16px; fill: white; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-sub { font-size: 12px; color: var(--text-3); }
  .last-update { font-size: 12px; color: var(--text-3); }

  .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }

  .stat-label { font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.warning { color: #b45309; }
  .stat-value.success { color: #166534; }

  .controls {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    box-shadow: var(--shadow);
  }

  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    stroke: var(--text-3);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 8px 10px 8px 32px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface-2);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-3); }

  select.filter-select {
    padding: 8px 10px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface-2);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
    min-width: 150px;
  }

  .btn-refresh {
    padding: 8px 14px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface-2);
    color: var(--text-2);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .btn-refresh:hover { background: var(--border); color: var(--text); }

  .btn-refresh svg {
    width: 14px; height: 14px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  .btn-refresh.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .table-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  thead th {
    background: var(--surface-2);
    border-bottom: 0.5px solid var(--border-strong);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  th.col-nucleo  { width: 90px; }
  th.col-cliente { width: auto; }
  th.col-status  { width: 130px; }
  th.col-resp    { width: 130px; }
  th.col-jira    { width: 110px; }
  th.col-data    { width: 100px; }

  tbody tr {
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
    cursor: default;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface-2); }

  td {
    padding: 11px 14px;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    vertical-align: middle;
  }

  td.muted { color: var(--text-3); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .badge-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .badge.aberta    { background: var(--accent-bg); color: var(--accent-text); }
  .badge.aberta .badge-dot { background: var(--accent); }
  .badge.andamento { background: var(--warning-bg); color: var(--warning-text); }
  .badge.andamento .badge-dot { background: #d97706; }
  .badge.entregar  { background: var(--success-bg); color: var(--success-text); }
  .badge.entregar .badge-dot { background: #16a34a; }
  .badge.finalizado { background: var(--gray-bg); color: var(--gray-text); }
  .badge.finalizado .badge-dot { background: #888; }
  .badge.jira      { background: var(--purple-bg); color: var(--purple-text); }
  .badge.jira .badge-dot { background: #7c3aed; }
  .badge.outro     { background: var(--gray-bg); color: var(--gray-text); }
  .badge.outro .badge-dot { background: #aaa; }

  .jira-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }

  .jira-link:hover { text-decoration: underline; }

  .jira-link svg {
    width: 11px; height: 11px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    padding: 56px 24px;
    color: var(--text-3);
  }

  .empty-state svg {
    width: 36px; height: 36px;
    stroke: var(--text-3); fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    margin-bottom: 12px;
  }

  .empty-state p { font-size: 14px; }

  .error-banner {
    background: var(--danger-bg);
    border: 0.5px solid #fca5a5;
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--danger-text);
    font-size: 13px;
    margin-bottom: 16px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .error-banner svg {
    width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  .results-count {
    font-size: 12px;
    color: var(--text-3);
    margin-left: auto;
    white-space: nowrap;
  }

  @media (max-width: 640px) {
    .topbar { padding: 0 14px; }
    .main { padding: 14px 12px; }
    th.col-resp, td:nth-child(4) { display: none; }
    th.col-data, td:nth-child(6) { display: none; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <svg viewBox="0 0 16 16"><path d="M3 8a5 5 0 1 1 10 0A5 5 0 0 1 3 8z" opacity=".3"/><path d="M8 4v4l3 1.5"/></svg>
    </div>
    <div>
      <div class="topbar-title">Monitoramento de Análises</div>
      <div class="topbar-sub">Londrisoft CS</div>
    </div>
  </div>
  <div class="last-update" id="last-update">—</div>
</header>

<main class="main">

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Em andamento</div>
      <div class="stat-value accent" id="stat-andamento">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Aguard. Jira</div>
      <div class="stat-value warning" id="stat-jira">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Para entregar</div>
      <div class="stat-value success" id="stat-entregar">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Concluídas</div>
      <div class="stat-value" id="stat-concluidas">—</div>
    </div>
  </div>

  <div id="error-area"></div>

  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" type="text" id="search" placeholder="Buscar por cliente, CNPJ, Jira issue ou ID Núcleo..." oninput="filterTasks()" />
    </div>
    <select class="filter-select" id="status-filter" onchange="filterTasks()">
      <option value="">Todos os status</option>
    </select>
    <span class="results-count" id="results-count"></span>
    <button class="btn-refresh" id="btn-refresh" onclick="loadTasks()">
      <svg id="refresh-icon" viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      Atualizar
    </button>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th class="col-nucleo">ID Núcleo</th>
          <th class="col-cliente">Cliente / Tarefa</th>
          <th class="col-status">Status</th>
          <th class="col-resp">Responsável</th>
          <th class="col-jira">Jira Issue</th>
          <th class="col-data">Vencimento</th>
        </tr>
      </thead>
      <tbody id="task-body">
        <tr><td colspan="6" class="empty-state" style="text-align:center; padding: 48px; color: var(--text-3);">Carregando...</td></tr>
      </tbody>
    </table>
  </div>

</main>

<script>
let allTasks = [];
let statusSet = new Set();

function statusClass(s) {
  s = (s || '').toLowerCase();
  if (s.includes('andamento') || s.includes('progress') || s.includes('em análise')) return 'andamento';
  if (s.includes('entregar') || s.includes('deliver')) return 'entregar';
  if (s.includes('finaliz') || s.includes('conclu') || s.includes('done') || s.includes('closed')) return 'finalizado';
  if (s.includes('jira') || s.includes('aguard')) return 'jira';
  if (s.includes('aberta') || s.includes('aberto') || s.includes('open') || s.includes('todo') || s.includes('nova')) return 'aberta';
  return 'outro';
}

function badge(status) {
  const cls = statusClass(status);
  return `<span class="badge ${cls}"><span class="badge-dot"></span>${status || '—'}</span>`;
}

function formatDate(ts) {
  if (!ts) return null;
  return new Date(parseInt(ts)).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

function isOverdue(ts) {
  if (!ts) return false;
  return parseInt(ts) < Date.now();
}

function jiraKey(url) {
  if (!url) return '';
  const parts = url.split('/').filter(Boolean);
  return parts[parts.length - 1] || 'Ver issue';
}

function renderTable(tasks) {
  const tbody = document.getElementById('task-body');
  document.getElementById('results-count').textContent = `${tasks.length} resultado${tasks.length !== 1 ? 's' : ''}`;

  if (!tasks.length) {
    tbody.innerHTML = `<tr><td colspan="6">
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <p>Nenhuma tarefa encontrada</p>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = tasks.map(t => {
    const overdue = isOverdue(t.due_date) && statusClass(t.status) !== 'finalizado';
    const dateStr = formatDate(t.due_date);
    const jiraUrl = t.jiraUrl || '';
    const key = jiraKey(jiraUrl);
    const resp = t.assignees.join(', ') || '—';
    const label = t.cliente || t.name;

    return `<tr>
      <td title="${t.nucleo || '—'}" style="font-family: monospace; font-size: 12px; color: var(--text-2);">${t.nucleo || '<span style="color:var(--text-3)">—</span>'}</td>
      <td title="${label}">${label}</td>
      <td>${badge(t.status)}</td>
      <td title="${resp}" style="color: var(--text-2);">${resp}</td>
      <td>${jiraUrl
        ? `<a class="jira-link" href="${jiraUrl}" target="_blank" rel="noopener">${key}<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`
        : '<span style="color:var(--text-3)">—</span>'
      }</td>
      <td style="color: ${overdue ? '#dc2626' : 'var(--text-2)'}; font-size: 12px;">${dateStr || '<span style="color:var(--text-3)">—</span>'}</td>
    </tr>`;
  }).join('');
}

function updateStats(tasks) {
  document.getElementById('stat-total').textContent = tasks.length;
  document.getElementById('stat-andamento').textContent = tasks.filter(t => ['aberta','andamento'].includes(statusClass(t.status))).length;
  document.getElementById('stat-jira').textContent = tasks.filter(t => statusClass(t.status) === 'jira').length;
  document.getElementById('stat-entregar').textContent = tasks.filter(t => statusClass(t.status) === 'entregar').length;
  document.getElementById('stat-concluidas').textContent = tasks.filter(t => statusClass(t.status) === 'finalizado').length;
}

function populateStatusFilter() {
  const sel = document.getElementById('status-filter');
  const current = sel.value;
  sel.innerHTML = '<option value="">Todos os status</option>';
  [...statusSet].sort().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    if (s === current) opt.selected = true;
    sel.appendChild(opt);
  });
}

function filterTasks() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sf = document.getElementById('status-filter').value;
  const filtered = allTasks.filter(t => {
    const haystack = [t.nucleo, t.cliente, t.name, t.jiraUrl].join(' ').toLowerCase();
    const matchQ = !q || haystack.includes(q);
    const matchS = !sf || t.status === sf;
    return matchQ && matchS;
  });
  renderTable(filtered);
  updateStats(filtered);
}

async function loadTasks() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  document.getElementById('error-area').innerHTML = '';
  document.getElementById('last-update').textContent = 'Atualizando...';

  try {
    const res = await fetch('/api/tasks');
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    allTasks = data.tasks || [];
    statusSet = new Set(allTasks.map(t => t.status).filter(Boolean));
    populateStatusFilter();
    filterTasks();
    const now = new Date();
    document.getElementById('last-update').textContent = `Atualizado às ${now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
  } catch(e) {
    document.getElementById('error-area').innerHTML = `
      <div class="error-banner">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>Erro ao carregar tarefas: <strong>${e.message}</strong>. Verifique as variáveis de ambiente no Vercel.</span>
      </div>`;
    document.getElementById('task-body').innerHTML = `<tr><td colspan="6"><div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>Falha ao carregar</p></div></td></tr>`;
    document.getElementById('last-update').textContent = 'Falha na atualização';
  } finally {
    btn.classList.remove('spinning');
  }
}

loadTasks();
setInterval(loadTasks, 60000);
</script>
</body>
</html>
